<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Portal | VAST</title>
    <!-- Tailwind CSS CDN for modern layout -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">

    <!-- Navigation Header -->
    <nav class="bg-indigo-900 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-xl font-bold tracking-wide">VAST Faculty Portal</a>
            <div class="space-x-6">
                <a href="/" class="hover:text-indigo-200 transition">Home & Profile</a>
                <a href="/courses" class="hover:text-indigo-200 transition">Courses</a>
                <a href="/discussions" class="hover:text-indigo-200 transition">Discussion Hub</a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 text-center py-6 border-t border-gray-700">
        <p>© 2026 Vidya Academy of Science and Technology, Thrissur. All Rights Reserved.</p>
    </footer>

</body>
</html>
